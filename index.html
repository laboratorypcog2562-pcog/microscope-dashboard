<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Microscopy Control Room
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div id="alertContainer"></div>

<div class="header">

<h1>
🔬 Microscopy Control Room Dashboard
</h1>

<p>
Department of Pharmacognosy Laboratory
</p>

</div>

<div class="summary">

<div class="summary-card normal">

<div id="normalCount">
0
</div>

<span>
Normal
</span>

</div>

<div class="summary-card warning">

<div id="warningCount">
0
</div>

<span>
Warning
</span>

</div>

<div class="summary-card danger">

<div id="dangerCount">
0
</div>

<span>
Out of Service
</span>

</div>

<div class="summary-card norecord">

<div id="norecordCount">
0
</div>

<span>
No Record
</span>

</div>

</div>

<div id="dashboard"></div>

<script>

fetch('data.json')

.then(response => response.json())

.then(data => {

let normal = 0;
let warning = 0;
let danger = 0;
let norecord = 0;

const dashboard =
document.getElementById("dashboard");

const alertContainer =
document.getElementById("alertContainer");

dashboard.innerHTML = "";

data.forEach(item => {

const microscope =
item.microscope || "-";

const user =
item.user || "-";

const date =
item.date || "-";

const status =
(item.status || "").toString();

let cardClass = "norecord";

if(status.includes("Normal")){

cardClass = "normal";
normal++;

}
else if(status.includes("Warning")){

cardClass = "warning";
warning++;

}
else if(status.includes("Out of Service")){

cardClass = "danger";
danger++;

}
else{

norecord++;

}

dashboard.innerHTML += `

<div class="card ${cardClass}">

<h3>${microscope}</h3>

<div class="status">

${status}

</div>

<div class="user">

👤 ${user}

</div>

<div class="date">

📅 ${date}

</div>

</div>

`;

});

/* ALERT */

if(danger > 0){

alertContainer.innerHTML += `

<div class="alert-danger">

🔴 ALERT :
พบกล้องใช้งานไม่ได้
${danger} เครื่อง

</div>

`;

}

if(warning > 0){

alertContainer.innerHTML += `

<div class="alert-warning">

🟡 WARNING :
พบกล้องมีปัญหาเล็กน้อย
${warning} เครื่อง

</div>

`;

}

if(danger === 0 &&
warning === 0){

alertContainer.innerHTML += `

<div class="alert-success">

🟢 ระบบปกติ
กล้องทั้งหมดพร้อมใช้งาน

</div>

`;

}

document.getElementById(
"normalCount"
).innerText = normal;

document.getElementById(
"warningCount"
).innerText = warning;

document.getElementById(
"dangerCount"
).innerText = danger;

document.getElementById(
"norecordCount"
).innerText = norecord;

})

.catch(error => {

document.body.innerHTML =

"<h1>ERROR</h1><pre>" +
error +
"</pre>";

console.error(error);

});

</script>

</body>

</html>
