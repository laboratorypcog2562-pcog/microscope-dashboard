<script>

fetch('data.json')

.then(response => response.json())

.then(data => {

let normal = 0;
let warning = 0;
let danger = 0;
let norecord = 0;

const alertContainer =
document.getElementById("alertContainer");

const dashboard =
document.getElementById("dashboard");

data.forEach(item => {

let cardClass = "norecord";

if(item.status.includes("Normal")){

cardClass = "normal";
normal++;

}
else if(item.status.includes("Warning")){

cardClass = "warning";
warning++;

}
else if(item.status.includes("Out of Service")){

cardClass = "danger";
danger++;

}
else{

norecord++;

}

dashboard.innerHTML += `

<div class="card ${cardClass}">

<h3>${item.microscope}</h3>

<div class="status">
${item.status}
</div>

<div class="user">
👤 ${item.user}
</div>

<div class="date">
📅 ${item.date}
</div>

</div>

`;

});


/* ===== ALERT BANNER ===== */

if (danger > 0) {

  alertContainer.innerHTML += `
    <div class="alert-danger">
      🔴 ALERT : พบกล้องใช้งานไม่ได้ ${danger} เครื่อง
    </div>
  `;

}

if (warning > 0) {

  alertContainer.innerHTML += `
    <div class="alert-warning">
      🟡 WARNING : พบกล้องมีปัญหาเล็กน้อย ${warning} เครื่อง
    </div>
  `;

}

if (danger === 0 && warning === 0) {

  alertContainer.innerHTML += `
    <div class="alert-success">
      🟢 ระบบปกติ กล้องทั้งหมดพร้อมใช้งาน
    </div>
  `;

}


/* ===== SUMMARY ===== */

document.getElementById("normalCount").innerText =
normal;

document.getElementById("warningCount").innerText =
warning;

document.getElementById("dangerCount").innerText =
danger;

document.getElementById("norecordCount").innerText =
norecord;

});

</script>
