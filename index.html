<script>

fetch('data.json')

.then(response => response.json())

.then(data => {

let normal = 0;
let warning = 0;
let danger = 0;
let norecord = 0;

const dashboard =
document.getElementById("dashboard");

const alertContainer =
document.getElementById("alertContainer");

const problemPanel =
document.getElementById("problemPanel");

dashboard.innerHTML = "";
alertContainer.innerHTML = "";
problemPanel.innerHTML = "";

let problemList = [];

data.forEach(item => {

const microscope =
item.microscope || "-";

const user =
item.user || "-";

const course =
item.course || "-";

const location =
item.location || "-";

const problem =
item.problem || "-";

const image =
item.image || "-";

let date = item.date || "-";

if(date !== "-"){

try{

date =
new Date(date).toLocaleString(
"th-TH",
{
year:"numeric",
month:"short",
day:"numeric",
hour:"2-digit",
minute:"2-digit"
}
);

}catch(e){}

}

const status =
(item.status || "").toString();

let cardClass = "norecord";

if(status.includes("Normal")){

cardClass = "normal";
normal++;

}
else if(status.includes("Warning")){

cardClass = "warning";
warning++;

problemList.push(
`${microscope} : ${problem}`
);

}
else if(status.includes("Out of Service")){

cardClass = "danger";
danger++;

problemList.push(
`${microscope} : ${problem}`
);

}
else{

norecord++;

}

dashboard.innerHTML += `

<div class="card ${cardClass}">

<h3>${microscope}</h3>

<div class="status">
${status}
</div>

<div class="user">
👤 ${user}
</div>

<div class="course">
📘 ${course}
</div>

<div class="location">
📍 ${location}
</div>

<div class="date">
📅 ${date}
</div>

${
problem !== "-"
?
`<div class="problem">
⚠️ ${problem}
</div>`
:
""
}

${
image !== "-"
?
`
<div class="imageBox">
<a href="${image}"
target="_blank">
📷 ดูรูป
</a>
</div>
`
:
""
}

</div>

`;

});


/* ALERT */

if(danger > 0){

alertContainer.innerHTML += `

<div class="alert-danger">

🔴 ALERT :
พบกล้องใช้งานไม่ได้
${danger} เครื่อง

</div>

`;

}

if(warning > 0){

alertContainer.innerHTML += `

<div class="alert-warning">

🟡 WARNING :
พบกล้องมีปัญหา
${warning} เครื่อง

</div>

`;

}

if(danger === 0 &&
warning === 0){

alertContainer.innerHTML += `

<div class="alert-success">

🟢 ระบบปกติ
กล้องทั้งหมดพร้อมใช้งาน

</div>

`;

}


/* PROBLEM LIST */

if(problemList.length > 0){

problemPanel.innerHTML =

`
<div class="problem-panel">

<h2>
⚠️ รายชื่อกล้องที่มีปัญหา
</h2>

<ul>

${problemList.map(
p => `<li>${p}</li>`
).join("")}

</ul>

</div>
`;

}


/* SUMMARY */

document.getElementById(
"normalCount"
).innerText = normal;

document.getElementById(
"warningCount"
).innerText = warning;

document.getElementById(
"dangerCount"
).innerText = danger;

document.getElementById(
"norecordCount"
).innerText = norecord;


/* SEARCH */

const searchBox =
document.getElementById("searchBox");

if(searchBox){

searchBox.addEventListener(
"keyup",
function(){

const keyword =
this.value.toLowerCase();

const cards =
document.querySelectorAll(
".card"
);

cards.forEach(card => {

const text =
card.innerText.toLowerCase();

card.style.display =
text.includes(keyword)
? "block"
: "none";

});

});

}

})

.catch(error => {

console.error(error);

document.body.innerHTML =

`
<h1>
ERROR LOADING DATA
</h1>

<pre>
${error}
</pre>
`;

});

</script>
