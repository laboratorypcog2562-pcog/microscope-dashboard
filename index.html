<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microscopy Control Room</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="alertContainer"></div>

<div class="header">

<h1>🔬 Microscopy Control Room Dashboard</h1>

<p>
Department of Pharmacognosy Laboratory
</p>

</div>

<div class="summary">

<div class="summary-card normal">
<div id="normalCount">0</div>
<span>Normal</span>
</div>

<div class="summary-card warning">
<div id="warningCount">0</div>
<span>Warning</span>
</div>

<div class="summary-card danger">
<div id="dangerCount">0</div>
<span>Out of Service</span>
</div>

<div class="summary-card norecord">
<div id="norecordCount">0</div>
<span>No Record</span>
</div>

</div>

<div id="dashboard"></div>

<script>

fetch('data.json')

.then(response => response.json())

.then(data => {

let normal = 0;
let warning = 0;
let danger = 0;
let norecord = 0;

const dashboard =
document.getElementById("dashboard");

data.forEach(item => {

let cardClass = "norecord";

if(item.status.includes("Normal")){

cardClass = "normal";
normal++;

}
else if(item.status.includes("Warning")){

cardClass = "warning";
warning++;

}
else if(item.status.includes("Out of Service")){

cardClass = "danger";
danger++;

}
else{

norecord++;

}

dashboard.innerHTML += `

<div class="card ${cardClass}">

<h3>${item.microscope}</h3>

<div class="status">
${item.status}
</div>

<div class="user">
👤 ${item.user}
</div>

<div class="date">
📅 ${item.date}
</div>

</div>

`;

});

document.getElementById("normalCount").innerText =
normal;

document.getElementById("warningCount").innerText =
warning;

document.getElementById("dangerCount").innerText =
danger;

document.getElementById("norecordCount").innerText =
norecord;

});

</script>

</body>
</html>
